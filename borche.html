<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaabildevs | Brochure</title>
    <style>
        /* 1. Reset defaults */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; 
            background-color: #1a1a1a;
        }

        /* 2. Centering Container */
        #borche {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        /* 3. The PDF Viewer */
        iframe {
            width: 90%; 
            height: 90%; 
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            background-color: white; 
        }

        /* 4. Mobile Adjustments */
        @media screen and (max-width: 768px) {
            iframe {
                width: 100%;   
                height: 100%;  
                border-radius: 0;
            }
        }
    </style>
</head>
<body>

    <div id="borche">
        <iframe 
            src="spics/brochure.pdf" 
            title="Kaabildevs Brochure">
        </iframe>
    </div>

</body>
</html>
